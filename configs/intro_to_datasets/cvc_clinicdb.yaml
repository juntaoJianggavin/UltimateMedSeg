# ============================================================================
# CVC-ClinicDB — 结肠镜息肉分割 (Colonoscopy Polyp Segmentation)
# ============================================================================
#
# 简介:
#   Bernal et al., 2015, "WM-DOVA maps for accurate polyp highlighting"
#   612 张结肠镜图像 + 对应息肉 mask
#   二分类: 背景 vs 息肉
#   图像尺寸: 384×288 (固定)
#   是息肉分割领域最经典的 benchmark 之一
#
# 官方划分: 无（需自行划分）
# 推荐用法:
#   - 5折交叉验证（PraNet / HarDNet-MSEG 等论文常用）
#   - 或 8:1:1 随机划分
#   - 或作为跨数据集泛化测试集（在 Kvasir-SEG 上训练，CVC-ClinicDB 上测试）
#
# 下载:
#   官方: https://polyp.grand-challenge.org/CVCClinicDB/
#   镜像: https://www.kaggle.com/datasets/balraj98/cvcclinicdb
#   下载后目录结构:
#     data/CVC-ClinicDB/
#     ├── images/    (1.png, 2.png ... 612.png)
#     └── masks/     (1.png, 2.png ... 612.png)
#
# 注意: mask 二值 (0/255)，白色=息肉
# ============================================================================

model:
  num_classes: 2
  img_size: 352
  encoder:
    name: timm_resnet50
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: unet
    params: {}
  bottleneck:
    name: none

data:
  type: generic
  img_size: 352
  root_dir: ./data/CVC-ClinicDB
  img_suffix: .png
  mask_suffix: .png
  # 5折交叉验证
  n_splits: 5
  fold_idx: 0
  random_state: 42

training:
  epochs: 200
  batch_size: 16
  num_workers: 4
  val_interval: 10
  save_interval: 50
  loss:
    name: compound
    params:
      losses:
        - name: ce
          weight: 0.4
        - name: dice
          weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
