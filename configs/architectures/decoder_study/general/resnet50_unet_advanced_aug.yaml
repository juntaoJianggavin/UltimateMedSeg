model:
  num_classes: 2
  img_size: 256
  encoder:
    name: timm_resnet50
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: unet
    params: {}
  skip_connection:
    name: concat
    params: {}
  bottleneck:
    name: none
    params: {}
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
training:
  augmentation: pipeline
  aug_pipeline:
    # Basic spatial transforms
    - name: horizontal_flip
      params: {p: 0.5}
    - name: vertical_flip
      params: {p: 0.3}
    - name: random_rotate90
      params: {p: 0.3}
    - name: random_rotate
      params: {p: 0.3, degrees_range: [-30, 30]}
    - name: random_scale
      params: {p: 0.3, scale_range: [0.85, 1.15]}
    # Advanced geometric transforms
    - name: random_affine
      params: {p: 0.3, degrees_range: [-15, 15], translate_range: [0.0, 0.1], scale_range: [0.9, 1.1], shear_range: [-5, 5]}
    - name: random_perspective
      params: {p: 0.2, distortion_scale_range: [0.05, 0.15]}
    - name: elastic_deform
      params: {p: 0.2, alpha_range: [20, 80], sigma_range: [3, 7]}
    # Advanced segmentation augmentations
    - name: copy_paste
      params: {p: 0.3, max_objects: 3, scale_range: [0.5, 1.5], blend_ratio_range: [0.0, 0.3]}
    - name: mosaic
      params: {p: 0.2, offset_range: [0.0, 0.2]}
    # Appearance transforms
    - name: photometric_distortion
      params: {p: 0.3, brightness_range: [-0.2, 0.2], contrast_range: [0.8, 1.2], saturation_range: [0.8, 1.2], hue_range: [-18, 18]}
    - name: clahe
      params: {p: 0.2, clip_limit_range: [1.0, 5.0], tile_size_range: [4, 16]}
    - name: gamma_correction
      params: {p: 0.2, gamma_range: [0.7, 1.5]}
    # Dropout-style augmentations
    - name: grid_mask
      params: {p: 0.2, d_range: [0.05, 0.15], ratio_range: [0.3, 0.7]}
    - name: random_erasing
      params: {p: 0.3, scale_range: [0.02, 0.1], ratio_range: [0.3, 3.3], max_count: 2}
    - name: coarse_dropout
      params: {p: 0.3, num_holes_range: [1, 5], hole_height_range: [0.02, 0.1], hole_width_range: [0.02, 0.1]}
    # Intensity/noise
    - name: gaussian_noise
      params: {p: 0.2, std_range: [0.01, 0.05]}
    - name: gaussian_blur
      params: {p: 0.15, kernel_range: [3, 7], sigma_range: [0.1, 2.0]}
    - name: random_solarize
      params: {p: 0.1, threshold_range: [0.3, 0.7]}
    - name: sharpness
      params: {p: 0.2, factor_range: [0.5, 1.5]}
    # Color/channel
    - name: color_jitter
      params: {p: 0.2, brightness_range: [-0.2, 0.2], contrast_range: [0.8, 1.2]}
    - name: brightness_contrast
      params: {p: 0.2, brightness_range: [-0.2, 0.2], contrast_range: [0.8, 1.2]}
    - name: channel_dropout
      params: {p: 0.1, drop_count_range: [1, 1]}
    - name: posterize
      params: {p: 0.1, bits_range: [2, 6]}
  random_state: 42
  epochs: 200
  batch_size: 8
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
  scheduler:
    name: cosine
    min_lr: 1.0e-06
