# Source: https://github.com/ZJUGiveLab/UNet-Version
# Reference: Huang et al., "UNet 3+: A Full-Scale Connected UNet", ICASSP 2020
# Network: unet3plus (complete architecture)
# 完整网络：unet3plus（完整架构）

model:
  num_classes: 2
  img_size: 256
  architecture: unet3plus
  encoder:
    in_channels: 3
  arch_params:
    base_ch: 64
    cat_ch: 64
    deep_supervision: false
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0
