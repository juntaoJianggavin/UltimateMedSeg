# Source: https://github.com/juntaoJianggavin/LV-UNet
# Network: lv_unet (complete architecture)
# 完整网络：lv_unet（完整架构）

model:
  num_classes: 2
  img_size: 256
  architecture: lv_unet
  encoder:
    in_channels: 3
  arch_params:
    dims:
    - 80
    - 160
    - 240
    - 480
    dims2:
    - 80
    - 40
    - 24
    - 16
    act_num: 1
    strides:
    - 2
    - 2
    - 2
    pretrained: true
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
