# Source: https://github.com/SLDGroup/MK-UNet
# Network: mk_unet (complete architecture)
# 完整网络：mk_unet（完整架构）

model:
  architecture: mk_unet
  num_classes: 2
  img_size: 256
  encoder:
    in_channels: 3
  arch_params:
    channels:
    - 16
    - 32
    - 64
    - 96
    - 160
    depths:
    - 1
    - 1
    - 1
    - 1
    - 1
    kernel_sizes:
    - 1
    - 3
    - 5
    expansion_factor: 2
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 24
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0
