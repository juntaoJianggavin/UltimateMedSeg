# Source: https://github.com/bowang-lab/U-Mamba
# Network: umamba_enc (complete architecture)
# 完整网络：umamba_enc（完整架构）

model:
  num_classes: 2
  img_size: 256
  architecture: umamba_enc
  encoder:
    in_channels: 3
  arch_params:
    features:
    - 32
    - 64
    - 128
    - 256
    - 512
    mamba_d_state: 16
    mamba_d_conv: 4
    mamba_expand: 2
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
