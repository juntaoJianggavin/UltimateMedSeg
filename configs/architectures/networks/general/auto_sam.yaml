# Source: https://github.com/talshaharabany/AutoSAM
# Network: auto_sam (complete architecture)
# 完整网络：auto_sam（完整架构）
model:
  architecture: auto_sam
  num_classes: 2
  img_size: 256
  encoder:
    in_channels: 3
  arch_params:
    pretrained: true
    pretrained_path: null
    freeze_image_encoder: true
    freeze_prompt_encoder: true
    freeze_mask_decoder: false
    unfreeze_last_n_blocks: 4
    inference_only: false

data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test

training:
  epochs: 300
  batch_size: 4
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
        - {name: ce, weight: 0.4}
        - {name: dice, weight: 0.6}
  optimizer:
    name: adamw
    lr: 1.0e-3
    weight_decay: 1.0e-4
  scheduler:
    name: cosine
    min_lr: 0
