# 场景2: train/val/test 三划分
# Scenario 2: Train/val/test three-way split
#
# data.train_ratio=0.7, val_ratio=0.15 → test 自动 0.15
# 最终在 test 集上评估最佳 val checkpoint

model:
  num_classes: 2
  img_size: 256
  encoder:
    name: timm_resnet50
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: unet
    params: {}
  bottleneck:
    name: none

data:
  type: image_mask
  img_size: 256
  root_dir: ./data/YourDataset
  img_suffix: .png
  mask_suffix: .png
  train_ratio: 0.7
  val_ratio: 0.15
  # test_ratio = 1 - 0.7 - 0.15 = 0.15 (自动推断)
  random_state: 42

training:
  epochs: 200
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  loss:
    name: compound
    params:
      losses:
        - name: ce
          weight: 0.4
        - name: dice
          weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
