# Source: https://github.com/ziyangwang007/Mamba-UNet
# Network: mamba_unet (complete architecture)
# 完整网络：mamba_unet（完整架构）

model:
  num_classes: 2
  img_size: 256
  architecture: mamba_unet
  encoder:
    in_channels: 3
  arch_params:
    embed_dim: 96
    depths:
    - 2
    - 2
    - 2
    - 2
    d_state: 16
    drop_path_rate: 0.1
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
