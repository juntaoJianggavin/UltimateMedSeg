# Source: https://github.com/wurenkai/UltraLight-VM-UNet
# Network: ultralight_vmunet (complete architecture)
# 完整网络：ultralight_vmunet（完整架构）

model:
  architecture: ultralight_vmunet
  num_classes: 2
  img_size: 256
  encoder:
    in_channels: 3
  arch_params:
    c_list:
    - 8
    - 16
    - 24
    - 32
    - 48
    - 64
    bridge: true
    split_att: fc
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 24
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0
