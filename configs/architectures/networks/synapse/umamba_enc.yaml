# Source: https://github.com/bowang-lab/U-Mamba
# Network: umamba_enc (complete architecture)
# 完整网络：umamba_enc（完整架构）

model:
  num_classes: 9
  img_size: 224
  architecture: umamba_enc
  encoder:
    in_channels: 3
  arch_params:
    features:
    - 32
    - 64
    - 128
    - 256
    - 512
    mamba_d_state: 16
    mamba_d_conv: 4
    mamba_expand: 2
data:
  type: synapse
  img_size: 224
  train_dir: ./data/Synapse/train_npz
  test_dir: ./data/Synapse/test_vol_h5
  train_list: ./data/Synapse/lists/lists_Synapse/train.txt
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt
training:
  epochs: 200
  batch_size: 24
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.01
    weight_decay: 3.0e-05
    momentum: 0.99
  scheduler:
    name: poly
    min_lr: 1.0e-06
    power: 0.9
