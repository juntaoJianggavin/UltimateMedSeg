# Source: NOT VERIFIED — model implementation not confirmed against an upstream repo; check medseg/encoders/foundation/HF_NAME_VERIFICATION.md before training.
# Network: vmkla_unet (complete architecture)
# 完整网络：vmkla_unet（完整架构）

model:
  num_classes: 4
  img_size: 224
  architecture: vmkla_unet
  encoder:
    in_channels: 3
  arch_params:
    embed_dim: 64
    depths:
    - 2
    - 2
    - 2
    - 2
    d_state: 16
    num_basis: 5
    drop_path_rate: 0.1
data:
  type: acdc
  img_size: 224
  train_dir: ./data/ACDC/train_npz
  test_dir: ./data/ACDC/test_vol_h5
  train_list: ./data/ACDC/lists/train.txt
  test_list: ./data/ACDC/lists/test_vol.txt
training:
  epochs: 200
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 1.0e-06
