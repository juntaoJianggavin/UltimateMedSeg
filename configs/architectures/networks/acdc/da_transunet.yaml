# Source: https://github.com/SUN-1024/DA-TransUnet
# Network: da_transunet (complete architecture)
# 完整网络：da_transunet（完整架构）

model:
  num_classes: 4
  img_size: 224
  architecture: da_transunet
  encoder:
    in_channels: 3
  arch_params:
    embed_dim: 256
    num_heads: 4
    num_layers: 2
    drop_path_rate: 0.1
data:
  type: acdc
  img_size: 224
  train_dir: ./data/ACDC/train_npz
  test_dir: ./data/ACDC/test_vol_h5
  train_list: ./data/ACDC/lists/train.txt
  test_list: ./data/ACDC/lists/test_vol.txt
training:
  epochs: 200
  batch_size: 24
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.01
    weight_decay: 0.0001
    momentum: 0.9
  scheduler:
    name: cosine
    min_lr: 1.0e-06
