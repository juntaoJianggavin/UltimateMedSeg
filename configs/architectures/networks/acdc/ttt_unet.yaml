# Source: https://github.com/rongzhou7/TTT-Unet
# Network: ttt_unet (complete architecture)
# 完整网络：ttt_unet（完整架构）

model:
  num_classes: 4
  img_size: 224
  architecture: ttt_unet
  encoder:
    in_channels: 3
  arch_params:
    features:
    - 32
    - 64
    - 128
    - 256
    - 512
    ttt_d_state: 16
data:
  type: acdc
  img_size: 224
  train_dir: ./data/ACDC/train_npz
  test_dir: ./data/ACDC/test_vol_h5
  train_list: ./data/ACDC/lists/train.txt
  test_list: ./data/ACDC/lists/test_vol.txt
training:
  epochs: 200
  batch_size: 8
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 1.0e-05
  scheduler:
    name: cosine
    min_lr: 1.0e-06
