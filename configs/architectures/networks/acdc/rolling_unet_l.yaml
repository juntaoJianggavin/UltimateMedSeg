# Source: https://github.com/Jiaoyang45/Rolling-Unet
# Reference: AAAI 2024
# Network: rolling_unet_l (complete architecture)
# 完整网络：rolling_unet_l（完整架构）

model:
  num_classes: 4
  img_size: 224
  architecture: rolling_unet_l
data:
  type: acdc
  img_size: 224
  train_dir: ./data/ACDC/train_npz
  test_dir: ./data/ACDC/test_vol_h5
  train_list: ./data/ACDC/lists/train.txt
  test_list: ./data/ACDC/lists/test_vol.txt
training:
  epochs: 200
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.5
      - name: dice
        weight: 0.5
  optimizer:
    name: adam
    lr: 0.001
    weight_decay: 1.0e-05
  scheduler:
    name: cosine
    min_lr: 1.0e-06
