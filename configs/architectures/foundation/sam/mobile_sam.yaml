# Source: https://github.com/ChaoningZhang/MobileSAM
# Foundation encoder: mobile_sam
# 基础模型编码器：mobile_sam
model:
  architecture: mobile_sam
  num_classes: 2
  img_size: native
  encoder:
    in_channels: 3
  arch_params:
    pretrained: true
    pretrained_path: null
    freeze_image_encoder: true
    freeze_prompt_encoder: true
    freeze_mask_decoder: false
    unfreeze_last_n_blocks: 4
    inference_only: false
data:
  type: generic
  img_size: native
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 100
  batch_size: 4
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 1.0e-06
