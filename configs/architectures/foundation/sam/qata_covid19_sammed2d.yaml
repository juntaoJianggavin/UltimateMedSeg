# Source: https://github.com/OpenGVLab/SAM-Med2D
# Text-guided segmentation: sammed2d_wrapper
# 文本引导分割：sammed2d_wrapper

model:
  num_classes: 1
  img_size: 256                                        # SAM-Med2D's 256-pixel checkpoint
  architecture: sammed2d_wrapper
  encoder:
    in_channels: 3
  arch_params:
    sam_type: vit_b
    pretrained: true                                   # auto-download from OpenGVLab HF
    pretrained_path: null                              # set to a local .pth to skip download
    freeze_image_encoder: true                         # only prompt encoder + decoder train
    freeze_prompt_encoder: false
    freeze_mask_decoder: false
    # Default click prompt: single foreground point at the image centre.
    # Override with anatomy-aware pixel coordinates if available.
    default_clicks: [[[128, 128]]]
    default_click_labels: [[1]]

data:
  type: qata_covid19
  img_size: 256
  data_root: ./data/QaTa-COV19

training:
  epochs: 50
  batch_size: 8
  num_workers: 4
  loss:
    name: compound
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0.000001
