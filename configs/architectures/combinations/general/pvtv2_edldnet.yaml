# Source: https://github.com/riadhassan/EDLDNet
# Architecture combination: encoder=pvtv2 + decoder=edldnet
# 架构组合：编码器=PVTv2 + 解码器=EDLDNet双线解码器
model:
  num_classes: 2
  img_size: 256
  encoder:
    name: pvtv2
    in_channels: 3
    pretrained: true
    params: {}
  bottleneck:
    name: none
    params: {}
  decoder:
    name: edldnet
    params:
      kernel_sizes: [1, 3, 5]
      expansion_factor: 6
      dw_parallel: true
      add: true
      ag_ks: 3
      activation: relu6
  skip_connection:
    name: concat
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
