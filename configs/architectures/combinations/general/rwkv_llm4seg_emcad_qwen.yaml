# Architecture combination: encoder=rwkv_unet + bottleneck=llm4seg + decoder=emcad
# 架构组合：编码器=RWKV-UNet + 瓶颈=LLM4Seg + 解码器=EMCAD
model:
  num_classes: 2
  img_size: 256
  encoder:
    name: rwkv_unet
    in_channels: 3
    pretrained: false
    params:
      variant: b
      drop_path: 0.05
  bottleneck:
    name: llm4seg
    params:
      llm_model: qwen
  decoder:
    name: emcad
    params: {}
  skip_connection:
    name: concat
    params: {}
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
