# Source: https://github.com/juntaoJianggavin/RWKV-UNet
# Architecture combination: encoder=rwkv_unet + decoder=emcad + skip=sab
# 架构组合：编码器=RWKV-UNet + 解码器=EMCAD + 跳连=空间注意力桥接
model:
  num_classes: 2
  img_size: 256
  encoder:
    name: rwkv_unet
    in_channels: 3
    pretrained: true
    params: {}
  bottleneck:
    name: none
    params: {}
  decoder:
    name: emcad
    params: {}
  skip_connection:
    name: sab
    params: {}
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
