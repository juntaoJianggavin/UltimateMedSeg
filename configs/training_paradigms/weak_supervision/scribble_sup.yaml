# Weak supervision: scribble_sup
# 弱监督学习：scribble_sup
model:
  num_classes: 9
  img_size: 224
  encoder:
    name: timm_resnet50
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: unet
    params: {}
  bottleneck:
    name: none
    params: {}
data:
  img_size: 224
  image_dir: ./data/images
  annotation_file: ./data/annotations/scribbles.json
  val:
    image_dir: ./data/val/images
    mask_dir: ./data/val/masks
  test:
    image_dir: ./data/test/images
    mask_dir: ./data/test/masks
weak_supervision:
  method: scribble_sup
  params:
    crf_weight: 0.1
    entropy_weight: 0.05
training:
  epochs: 150
  batch_size: 16
  num_workers: 4
  val_interval: 10
  save_interval: 30
  loss:
    name: scribble_sup
    params:
      ignore_index: -1
      crf_weight: 0.1
      entropy_weight: 0.05
      kernel_size: 3
      dilation: 1
      sigma_rgb: 15.0
      sigma_xy: 100.0
  optimizer:
    name: adamw
    lr: 0.0002
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 1.0e-06
