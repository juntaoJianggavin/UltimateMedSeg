# Weak supervision: toco
# 弱监督学习：toco
model:
  num_classes: 9
  img_size: 224
  encoder:
    name: timm_resnet50
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: unet
    params: {}
  bottleneck:
    name: none
    params: {}
data:
  img_size: 224
  image_dir: ./data/images
  label_file: ./data/annotations/image_labels.json
  val:
    image_dir: ./data/val/images
    mask_dir: ./data/val/masks
  test:
    image_dir: ./data/test/images
    mask_dir: ./data/test/masks
weak_supervision:
  method: toco
  params:
    lambda_ptc: 0.2
    lambda_ctc: 0.5
    cls_weight: 1.0
    temperature: 0.5
    high_thresh: 0.7
    low_thresh: 0.25
training:
  epochs: 150
  batch_size: 16
  num_workers: 4
  val_interval: 10
  save_interval: 30
  loss:
    name: toco
    params:
      lambda_ptc: 0.2
      lambda_ctc: 0.5
      cls_weight: 1.0
      temperature: 0.5
      high_thresh: 0.7
      low_thresh: 0.25
  optimizer:
    name: adamw
    lr: 6.0e-05
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 1.0e-06
