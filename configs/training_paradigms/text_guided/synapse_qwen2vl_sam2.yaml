# MLLM-Grounding × SAM2 Pipeline (Qwen2-VL + SAM2)
# Synapse multi-organ segmentation - 推理 only
#
# 三阶段 Detect-then-Segment paradigm：
#   Step 1. Qwen2-VL 7B 自然语言 → 每个器官的归一化 bbox（grounding）
#   Step 2. SAM2 (hiera-large) 用 bbox 作 prompt → 高质量 mask
#   Step 3. (可选) 现有分割模型在 ROI 内做 fine-grain 精细分割
#
# 使用方式（不是端到端训练 yaml，而是推理 Pipeline 配置）：
#
#   import yaml, numpy as np
#   from medseg.mllm import build_pipeline_from_config
#
#   cfg = yaml.safe_load(open('configs/text_guided/synapse_qwen2vl_sam2.yaml'))
#   pipe = build_pipeline_from_config(cfg)
#
#   image = np.array(Image.open('case0001_slice050.png').convert('RGB'))
#   out = pipe(image)
#   label_map = out.label_map               # (H, W) int multi-class label
#   per_class = out.per_class_masks         # {'spleen': mask, ...}
#
# 依赖：
#   pip install transformers>=4.45 accelerate qwen-vl-utils
#   pip install git+https://github.com/facebookresearch/sam2.git
#
# 未安装时所有 wrapper 自动 fallback 到 mock 模式，pipeline 仍可走通。

# ============================================================
# Step 1: MLLM grounding
# ============================================================

# text 输入: 在 mllm.class_names 中列出目标类别的英文名
# Text input: list target class names in English under mllm.class_names
# 示例 / Examples: "spleen", "right kidney", "liver", "tumor"
# Detector 自动构造 grounding prompt，用户无需关心 prompt 模板
# Detector auto-constructs grounding prompts, no need to worry about templates

mllm:
  class_names:
  - spleen
  - right kidney
  - left kidney
  - gallbladder
  - esophagus
  - liver
  - stomach
  - aorta
  grounder:
    type: qwen2vl
    model_id: Qwen/Qwen2-VL-7B-Instruct
    device: cuda
    dtype: bfloat16
    use_flash_attn: true
    max_new_tokens: 128
    prompt_template: 'Locate the {class_name} in this abdominal CT slice.

      If present, output the bounding box in the format

      <|box_start|>(x1,y1),(x2,y2)<|box_end|>.

      Coordinates should be in the range 0-1000.

      '
  mask_generator:
    type: sam2
    model_id: facebook/sam2-hiera-large
    device: cuda
    multimask: false
  refinement:
    enabled: false
    config_path: configs/synapse/unet_resnet34.yaml
    img_size: 224
    roi_padding: 0.1
data:
  type: synapse
  img_size: 1024
  test_dir: ./data/Synapse/test_vol_h5
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt
