# Text-Guided Segmentation with CLIP ViT-L/14 (Large, Aligned)
# Synapse multi-organ segmentation
#
# 使用 CLIP ViT-L/14 原始权重（无 ImageNet fine-tune），
# 与 CLIP ViT-L/14 文本塔（embed_dim=768）处于同一对齐空间。


# text 输入: 在 text_guided.class_names 中写每个类别的自然语言描述
# Text input: write natural language class descriptions in text_guided.class_names
# 示例 / Examples:
#   "background region" / "spleen organ" / "right kidney organ"

model:
  text_guided:
    model_type: TextPromptUNet
    prompt_mode: clip
    embed_dim: 768                       # CLIP ViT-L/14 文本嵌入维度
    use_external_encoder: true
    class_names:
      - background region
      - spleen organ
      - right kidney organ
      - left kidney organ
      - gallbladder organ
      - esophagus organ
      - liver organ
      - stomach organ
      - aorta vessel

  encoder:
    name: timm_vit_clip_large_p14_224    # 原始 CLIP ViT-L/14 权重，与文本塔对齐
    pretrained: true
    in_channels: 3
    params:
      out_channels: [128, 256, 512, 1024]
      pyramid_scales: 4

data:
  type: synapse
  img_size: 224
  train_dir: ./data/Synapse/train_npz
  val_dir: ./data/Synapse/val_npz
  test_dir: ./data/Synapse/test_vol_h5
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt

training:
  epochs: 200
  batch_size: 4                          # ViT-L 显存占用大，减小 batch
  num_workers: 4

  optimizer:
    name: adamw
    lr: 5.0e-5                             # 大模型用更小学习率
    weight_decay: 1.0e-4

  scheduler:
    name: cosine
    min_lr: 1.0e-6

  loss:
    name: compound
    params:
      ce_weight: 1.0
      dice_weight: 1.0

  val_interval: 10
  save_interval: 50
