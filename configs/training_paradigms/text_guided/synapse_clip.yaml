# Text-Guided Segmentation with CLIP Vision-Text Aligned Backbone
# Synapse multi-organ segmentation
#
# 视觉塔使用原始 CLIP ViT-B/32 权重（无 ImageNet fine-tune），
# 与文本塔 (openai/clip-vit-base-patch32 CLIPTextModel) 处于同一对齐空间。
# cross-attention + FiLM 在 decoder 中融合视觉特征与 CLIP 文本嵌入。
#
# Visual encoder: vit_base_patch32_clip_256 (original CLIP weights, aligned)
# Text encoder:   CLIPTextModel (openai/clip-vit-base-patch32, hidden_size=512)


# text 输入: 在 text_guided.class_names 中写每个类别的自然语言描述
# Text input: write natural language class descriptions in text_guided.class_names
# 示例 / Examples:
#   "background region" / "spleen organ" / "right kidney organ"

model:
  text_guided:
    model_type: TextPromptUNet
    prompt_mode: clip                    # 使用 CLIP text encoder 编码 class_names
    embed_dim: 512                       # CLIP text encoder hidden size
    use_external_encoder: true
    # 自然语言描述（CLIP 对完整短语效果更好）
    class_names:
      - background region
      - spleen organ
      - right kidney organ
      - left kidney organ
      - gallbladder organ
      - esophagus organ
      - liver organ
      - stomach organ
      - aorta vessel

  encoder:
    name: timm_vit_clip_base_p32_256   # 原始 CLIP ViT-B/32 权重，与文本塔对齐
    pretrained: true
    in_channels: 3
    img_size: 256                        # 256 = 32×8，patch32 输出 8×8 feature map
    params:
      out_channels: [128, 256, 512]
      pyramid_scales: 3                  # 3 级金字塔：8×8 → 4×4 → 2×2

data:
  type: synapse
  img_size: 256                          # 与 encoder 保持一致
  train_dir: ./data/Synapse/train_npz
  val_dir: ./data/Synapse/val_npz
  test_dir: ./data/Synapse/test_vol_h5
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt

training:
  epochs: 200
  batch_size: 8
  num_workers: 4

  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4

  scheduler:
    name: cosine
    min_lr: 1.0e-6

  loss:
    name: compound
    params:
      ce_weight: 1.0
      dice_weight: 1.0

  val_interval: 10
  save_interval: 50
