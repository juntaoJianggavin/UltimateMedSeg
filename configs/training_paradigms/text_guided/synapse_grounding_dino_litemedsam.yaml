# GroundingDINO + LiteMedSAM pipeline
# GroundingDINO + LiteMedSAM 检测→分割 pipeline (轻量级)
#
# 流程 / Pipeline:
#   1. GroundingDINO 用文本描述定位目标 → 输出 bounding boxes
#   2. LiteMedSAM (TinyViT-5M) 用 box prompt 生成 mask
#   LiteMedSAM 参数量仅 5.7M，推理速度快，适合资源受限场景
#   LiteMedSAM has only 5.7M params, fast inference for resource-limited settings
#


# text 输入: 在 mllm.class_names 中列出目标类别的英文名
# Text input: list target class names in English under mllm.class_names
# 示例 / Examples: "spleen", "right kidney", "liver", "tumor"
# Detector 自动构造 grounding prompt，用户无需关心 prompt 模板
# Detector auto-constructs grounding prompts, no need to worry about templates

mllm:
  class_names:
    - spleen
    - right kidney
    - left kidney
    - gallbladder
    - liver
    - stomach
    - aorta
    - pancreas

  grounder:
    type: grounding_dino
    model_type: tiny
    device: cuda
    box_threshold: 0.3
    text_threshold: 0.25

  mask_generator:
    type: lite_medsam
    checkpoint: null
    device: cuda
    image_size: 256

  refinement:
    enabled: false
