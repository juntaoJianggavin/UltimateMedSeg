# GroundingDINO + SAM-Med2D pipeline
# GroundingDINO + SAM-Med2D 检测→分割 pipeline
#
# 流程 / Pipeline:
#   1. GroundingDINO 用文本描述定位目标 → 输出 bounding boxes
#   2. SAM-Med2D 用 box prompt 生成高质量 mask
#


# text 输入: 在 mllm.class_names 中列出目标类别的英文名
# Text input: list target class names in English under mllm.class_names
# 示例 / Examples: "spleen", "right kidney", "liver", "tumor"
# Detector 自动构造 grounding prompt，用户无需关心 prompt 模板
# Detector auto-constructs grounding prompts, no need to worry about templates

mllm:
  class_names:
    - spleen
    - right kidney
    - left kidney
    - gallbladder
    - liver
    - stomach
    - aorta
    - pancreas

  grounder:
    type: grounding_dino
    model_type: tiny
    device: cuda
    box_threshold: 0.3
    text_threshold: 0.25

  mask_generator:
    type: sammed2d
    checkpoint: null  # 自动下载 / auto-download via weight_downloader
    device: cuda
    image_size: 256

  refinement:
    enabled: false
