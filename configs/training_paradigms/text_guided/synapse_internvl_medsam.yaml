# MLLM-Grounding × MedSAM Pipeline (InternVL2.5 + MedSAM)
# Synapse multi-organ segmentation - 推理 only
#
# 与 synapse_internvl_sam2.yaml 同 Detect-then-Segment paradigm，
# 仅把 SAM2 换成 MedSAM (Ma et al., NatComm 2024)。
#
# 依赖：
#   pip install transformers>=4.40 timm einops
#   pip install git+https://github.com/facebookresearch/segment-anything.git
#   下载 medsam_vit_b.pth 至本地

# ============================================================
# Step 1: MLLM grounding (InternVL2.5)
# ============================================================

# text 输入: 在 mllm.class_names 中列出目标类别的英文名
# Text input: list target class names in English under mllm.class_names
# 示例 / Examples: "spleen", "right kidney", "liver", "tumor"
# Detector 自动构造 grounding prompt，用户无需关心 prompt 模板
# Detector auto-constructs grounding prompts, no need to worry about templates

mllm:
  class_names:
  - spleen
  - right kidney
  - left kidney
  - gallbladder
  - esophagus
  - liver
  - stomach
  - aorta
  grounder:
    type: internvl
    model_id: OpenGVLab/InternVL2_5-8B
    device: cuda
    dtype: bfloat16
    max_new_tokens: 128
    prompt_template: '<image>

      Please provide the bounding box coordinates of the {class_name}

      in this abdominal CT slice, in the format

      <box>[[x1, y1, x2, y2]]</box>.

      '
  mask_generator:
    type: medsam
    model_id: vit_b
    checkpoint: ./checkpoints/medsam_vit_b.pth
    device: cuda
    image_size: 1024
    multimask: false
  refinement:
    enabled: false
    config_path: configs/synapse/unet_resnet34.yaml
    img_size: 224
    roi_padding: 0.1
data:
  type: synapse
  img_size: 1024
  test_dir: ./data/Synapse/test_vol_h5
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt
