# Grounding DINO × SAM2 Pipeline
# Synapse multi-organ segmentation - 推理 only
#
# 与 synapse_grounding_dino.yaml 的区别：
#   旧 yaml: Grounding DINO bbox → 现有分割 UNet 在 ROI 内 crop 分割
#   本 yaml: Grounding DINO bbox → SAM2 高质量 mask（可选再叠 UNet refinement）
#
# 接入方式与 Qwen2-VL/InternVL + SAM2 完全一致（同一 MLLMGrounder 抽象）：
#
#   import yaml, numpy as np
#   from medseg.mllm import build_pipeline_from_config
#
#   cfg = yaml.safe_load(open('configs/training_paradigms/text_guided/synapse_grounding_dino_sam2.yaml'))
#   pipe = build_pipeline_from_config(cfg)
#   out  = pipe(image_rgb_uint8)            # PipelineOutput(label_map, per_class_masks, ...)
#
# 依赖：
#   pip install groundingdino-py
#   pip install git+https://github.com/facebookresearch/sam2.git
#
# 未安装时所有 wrapper 自动 fallback 到 mock 模式。

# ============================================================
# Step 1: Grounding DINO 开放词汇 grounding
# ============================================================

# text 输入: 在 mllm.class_names 中列出目标类别的英文名
# Text input: list target class names in English under mllm.class_names
# 示例 / Examples: "spleen", "right kidney", "liver", "tumor"
# Detector 自动构造 grounding prompt，用户无需关心 prompt 模板
# Detector auto-constructs grounding prompts, no need to worry about templates

mllm:
  class_names:
  - spleen
  - right kidney
  - left kidney
  - gallbladder
  - esophagus
  - liver
  - stomach
  - aorta
  grounder:
    type: grounding_dino
    model_id: tiny
    device: cuda
    dtype: float32
    weights_path: null
    box_threshold: 0.35
    text_threshold: 0.25
    prompt_template: a medical CT image of {class_name}
  mask_generator:
    type: sam2
    model_id: facebook/sam2-hiera-large
    device: cuda
    multimask: false
  refinement:
    enabled: false
    config_path: configs/architectures/combinations/general/unet_resnet34.yaml
    img_size: 224
    roi_padding: 0.1
data:
  type: synapse
  img_size: 1024
  test_dir: ./data/Synapse/test_vol_h5
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt
