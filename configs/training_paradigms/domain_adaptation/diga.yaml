# DiGA: Distillation-Guided Adaptation for DA-SS (Shen et al., CVPR 2023)
# DiGA：基于双向蒸馏与类平衡 soft-CE 的域适应
#
# Reference: https://github.com/BIT-DA/DiGA
# Paper:     https://arxiv.org/abs/2304.02222
#
# 训练流程 / Algorithm:
#   Stage A: 对温度缩放后的 student / teacher softmax 做 *对称 KL* 蒸馏，
#            按 teacher 置信度做像素加权 (paper Eq. 3-4)；
#   Stage B: 用 teacher 的 soft-label 与 student 的 logits 做类平衡 soft-CE，
#            类权重 w_c = 1 - acc_c (EMA, paper Eq. 6)，缓解长尾崩塌。
#
# distill_weight:       L_distill (对称 KL) 权重
# ce_weight:            L_ce (类平衡 soft-CE) 权重
# temperature:          蒸馏温度 T (paper 默认 2.0)
# confidence_threshold: teacher 置信度阈值
# rampup_epochs:        Stage B 线性 rampup epoch 数 (0 = 不 rampup)
# class_acc_momentum:   类频率 EMA momentum
# num_classes:          分类数
#
# Usage: python train_domain_adaptation.py --config configs/domain_adaptation/diga.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks
  test:
    image_dir: ./data/target_test/images
    mask_dir: ./data/target_test/masks

domain_adaptation:
  method: diga
  source_free: false
  params:
    distill_weight: 1.0
    ce_weight: 1.0
    temperature: 2.0
    confidence_threshold: 0.5
    rampup_epochs: 0
    class_acc_momentum: 0.99
    num_classes: 4

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  loss:
    name: compound
    params:
      losses:
        - name: ce
          weight: 0.4
        - name: dice
          weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
