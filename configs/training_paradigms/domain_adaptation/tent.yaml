# Tent: Fully Test-Time Adaptation by Entropy Minimization
# Tent：基于熵最小化的全测试时适应
#
# Wang et al., ICLR 2021 (Spotlight)
# Official source: https://github.com/DequanWang/tent
#
# Source-Free TTA：仅需目标域数据 + 预训练模型
# Source-Free TTA: only target data + pretrained model needed
#
# entropy_weight: 熵最小化权重 / Entropy minimization weight
#
# Usage: python train_domain_adaptation.py --config configs/domain_adaptation/tent.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  # 目标域（无标签，仅在推理时适应）
  target:
    image_dir: ./data/target/images
  # 验证集（目标域有标签子集）
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks
  # 测试集（test.py 使用）
  test:
    image_dir: ./data/target_test/images
    mask_dir: ./data/target_test/masks
  # 预训练源模型路径（在源域训练好的模型）
  pretrained_model: ./checkpoints/source_model.pth

domain_adaptation:
  method: tent
  params:
    entropy_weight: 1.0

training:
  epochs: 50
  batch_size: 8
  num_workers: 4
  val_interval: 5
  save_interval: 25
  optimizer:
    name: adamw
    lr: 0.00001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
