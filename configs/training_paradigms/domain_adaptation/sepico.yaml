# SePiCo: Semantic-Guided Pixel Contrast for DA-SS (Xie et al., TPAMI 2023)
# SePiCo：基于类原型的语义引导像素级对比学习
#
# Reference: https://github.com/BIT-DA/SePiCo
# Paper:     https://arxiv.org/abs/2204.08808
#
# 训练流程 / Algorithm:
#   每个 batch 用 teacher 的高置信伪标签更新跨 batch 的类原型 (EMA mu_c, sigma_c)；
#   student 的 (L2-归一化 softmax) 像素特征对自身类原型做正、对其它类原型做负的 InfoNCE；
#   可选 dist_weight > 0 时再加入 Gaussian 分布对比 (paper Eq. 7)。
#
# proto_weight:         L_proto (InfoNCE) 权重 / Prototype-contrast weight
# dist_weight:          L_dist (Gaussian) 权重，0 = 关闭 / Distributional weight
# temperature:          InfoNCE 温度 tau / Contrastive temperature
# confidence_threshold: teacher 伪标签置信阈值 / PL confidence cutoff
# proto_momentum:       类原型 EMA momentum (paper 0.999)
# pixels_per_image:     每张图采样的锚点数 / Anchor pixels per image
# num_classes:          分类数 / Number of classes
#
# Usage: python train_domain_adaptation.py --config configs/training_paradigms/domain_adaptation/sepico.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks
  test:
    image_dir: ./data/target_test/images
    mask_dir: ./data/target_test/masks

domain_adaptation:
  method: sepico
  source_free: false
  params:
    proto_weight: 0.1
    dist_weight: 0.0
    temperature: 0.1
    confidence_threshold: 0.7
    proto_momentum: 0.999
    pixels_per_image: 512
    num_classes: 4

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  loss:
    name: compound
    params:
      losses:
        - name: ce
          weight: 0.4
        - name: dice
          weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
