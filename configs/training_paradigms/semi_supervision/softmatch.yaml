# SoftMatch (ICLR 2023)
# Reference: https://github.com/microsoft/Semi-supervised-learning
# ============================================================================
# SoftMatch — 数量-质量权衡伪标签
# SoftMatch — Quantity-Quality Tradeoff in Pseudo-Labeling
# ============================================================================
# 论文 / Paper:
#   Chen et al., "SoftMatch: Addressing the Quantity-Quality Tradeoff
#   in Semi-Supervised Learning", ICLR 2023
#   https://arxiv.org/abs/2210.06975
#
# 算法概述 / Algorithm:
#   - 使用软伪标签 (概率分布) 而非硬标签 (argmax)
#     Uses soft pseudo-labels (probability distribution) instead of hard labels (argmax)
#   - 数量: 低阈值保留更多伪标签 / Quantity: low threshold retains more pseudo-labels
#   - 质量: Gaussian 加权抑制低置信度预测 / Quality: Gaussian weighting suppresses low-confidence
#   - 总损失 = CE(strong_pred, soft_label) × Gaussian_weight
#     Total = CE(strong_pred, soft_label) × Gaussian_weight
#
# 参数说明 / Parameters:
#   confidence_threshold — 软标签置信度阈值 / Soft-label confidence threshold
#   consistency_weight   — 一致性损失权重 / Consistency loss weight
#   rampup_epochs        — 权重渐增周期数 / Epochs to ramp consistency from 0
#
# 适用场景 / Best for: 需要平衡伪标签数量与质量 / Balancing pseudo-label quantity vs quality
# 源码参考 / Reference code: https://github.com/TorchSSL/TorchSSL
#
# 用法 / Usage: python semi_train.py --config configs/training_paradigms/semi_supervision/softmatch.yaml
# ============================================================================

model:
  num_classes: 9
  img_size: 224
  encoder:
    name: timm_resnet50
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: unet
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  labeled_dir: ./data/labeled
  unlabeled_dir: ./data/unlabeled
  val_dir: ./data/val
  # 测试集路径（test.py 使用；若缺省则 test.py 会回退到 val_dir）
  test_dir: ./data/test
  test_list: ./data/test/list.txt
  labeled_ratio: 0.1
  split_mode: random

semi:
  method: softmatch
  params:
    dist_align: true
    ema_decay: 0.999
    consistency_weight: 1.0
    rampup_epochs: 40

training:
  epochs: 200
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  # Supervised loss for labeled data; the SoftMatch truncated-Gaussian weighting
  # + distribution alignment is handled inside medseg/semi/methods.py:SoftMatch.
  loss:
    name: compound
    params:
      losses:
        - name: ce
          weight: 0.5
        - name: dice
          weight: 0.5
  optimizer:
    name: adamw
    lr: 0.0003
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
