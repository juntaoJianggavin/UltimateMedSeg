# FreeMatch (ICLR 2023)
# Reference: https://github.com/microsoft/Semi-supervised-learning
# ============================================================================
# FreeMatch — 自适应阈值无超参数伪标签
# FreeMatch — Self-Adaptive Thresholding for Hyperparameter-Free Pseudo-Labeling
# ============================================================================
# 论文 / Paper:
#   Wang et al., "FreeMatch: Self-Adaptive Thresholding for Semi-Supervised
#   Learning", ICLR 2023  https://arxiv.org/abs/2205.07246
#
# 算法概述 / Algorithm:
#   - 自适应时间阈值: p_cutoff = EMA(max_prob) × time_p
#     Adaptive time threshold: p_cutoff = EMA(max_prob) × time_p
#   - time_p 动态调整: 初期低阈值 (探索), 后期高阈值 (精确)
#     time_p adjusts dynamically: low initially (explore), high later (exploit)
#   - 无固定超参数阈值, 完全自适应
#     No fixed hyperparameter threshold; fully adaptive
#   - 基于 SoftMatch 的软标签 + Gaussian 加权
#     Based on SoftMatch's soft labels + Gaussian weighting
#
# 参数说明 / Parameters:
#   consistency_weight — 一致性损失权重 / Consistency loss weight
#   rampup_epochs      — 权重渐增周期数 / Epochs to ramp consistency from 0
#
# 适用场景 / Best for: 不想手动调阈值时 / When you don't want to tune thresholds manually
# 源码参考 / Reference code: https://github.com/TorchSSL/TorchSSL
#
# 用法 / Usage: python semi_train.py --config configs/training_paradigms/semi_supervision/freematch.yaml
# ============================================================================

model:
  num_classes: 9
  img_size: 224
  encoder:
    name: timm_resnet50
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: unet
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  labeled_dir: ./data/labeled
  unlabeled_dir: ./data/unlabeled
  val_dir: ./data/val
  # 测试集路径（test.py 使用；若缺省则 test.py 会回退到 val_dir）
  test_dir: ./data/test
  test_list: ./data/test/list.txt
  labeled_ratio: 0.1
  split_mode: random

semi:
  method: freematch
  params:
    ema_momentum: 0.999
    ema_decay: 0.999
    consistency_weight: 1.0
    rampup_epochs: 40

training:
  epochs: 200
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  # Supervised loss for labeled data; the FreeMatch self-adaptive thresholding
  # + class-fairness regularizer is handled inside medseg/semi/methods.py:FreeMatch.
  loss:
    name: compound
    params:
      losses:
        - name: ce
          weight: 0.5
        - name: dice
          weight: 0.5
  optimizer:
    name: adamw
    lr: 0.0003
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
