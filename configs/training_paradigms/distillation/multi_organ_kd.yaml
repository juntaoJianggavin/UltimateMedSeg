# Multi-organ class-balanced KD (self-contained)
# (Self-contained: no single canonical GitHub source)
# Multi-Organ KD: Per-Class + Inter-Class Relation Distillation / 多器官蒸馏
# 医学图像专用：每个器官独立蒸馏 + 类别间关系矩阵匹配
# Medical-specific: Per-organ distillation + inter-class correlation matrix matching
#
# temperature: 蒸馏温度 / Distillation temperature
# relation_weight: 类别间关系损失权重 / Inter-class relation loss weight
# balance_mode: 类别平衡模式 (uniform/inverse_freq/custom)
#
# Usage: python train_distillation.py --teacher_config configs/distillation/teacher_large.yaml --student_config configs/distillation/multi_organ_kd.yaml

model:
  num_classes: 9
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks

distillation:
  method: multi_organ_kd
  params:
    temperature: 4.0
    relation_weight: 0.5
    balance_mode: uniform

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
