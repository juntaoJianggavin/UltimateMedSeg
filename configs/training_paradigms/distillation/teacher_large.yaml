# Teacher model config
# Reference: https://arxiv.org/abs/1503.02531
# Teacher model configuration (Large UNet)
# 教师模型配置（大型UNet）
#
# This is the powerful model that will guide the student
# 该强力模型将指导学生学习
#
# encoder: 编码器 / Encoder backbone (ViT + pyramid)
# decoder: 解码器 / Decoder architecture (UNet++)
# num_classes: 分割类别数 / Number of segmentation classes

model:
  encoder:
    name: timm_vit_dinov3_large
    pretrained: true
    params:
      out_channels: [128, 256, 512, 1024]
      pyramid_scales: 4
  
  decoder:
    name: unet
    params: {}
  
  num_classes: 9

data:
  type: synapse
  img_size: 224
  train_dir: ./data/Synapse/train_npz
  val_dir: ./data/Synapse/test_vol_h5
  # 测试集（test.py 使用，可与 val 一致）
  test_dir: ./data/Synapse/test_vol_h5
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt

training:
  epochs: 200
  batch_size: 8
  num_workers: 4
  
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4
  
  loss:
    name: compound
    params:
      ce_weight: 1.0
      dice_weight: 1.0
