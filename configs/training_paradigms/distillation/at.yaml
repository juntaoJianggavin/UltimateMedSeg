# AT: Attention Transfer (ICLR 2017)
# Reference: https://github.com/szagoruyko/attention-transfer
# Paper: https://arxiv.org/abs/1612.03928
#
# 注意力迁移：F_attn = sum_c |x_c|^p，flatten + L2 normalize 后做 L2 距离
# Activation-based spatial attention map matched between student/teacher.
#
# p: 注意力指数 / attention exponent (paper default 2)
# resize_to: spatial 对齐方向 (student / teacher)
# eps: L2 归一化数值下限 / numeric floor for L2 normalisation
#
# feature_layers: 抽特征的层，可指定多层做多尺度 AT
# (multi-layer AT is the paper setting; encoder-only works as a baseline)
#
# Usage:
#   python train_distillation.py \
#       --teacher_config configs/distillation/teacher_large.yaml \
#       --student_config configs/distillation/at.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks

distillation:
  method: at
  weight: 1000.0
  feature_layers:
    - encoder
  params:
    p: 2
    resize_to: student
    eps: 0.000001

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
