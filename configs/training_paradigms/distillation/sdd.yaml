# SDD: Scale Decoupled Distillation (CVPR 2024)
# Reference: https://github.com/shicaiwei123/SDD-CVPR2024
# Paper: https://arxiv.org/abs/2403.13512
#
# SDD：把 logits 按 multi-scale 拆解为 consistent (global) 与 complementary
# (per-scale region - global)，分别做温度 KL。
# Decouple logits into global + per-scale complementary parts and KL each.
#
# temperature: KL 温度 / softmax temperature
# scales: 互补尺度划分（H/s, W/s 区域池化） / complementary pooling scales
# alpha_consistent: 全局 KL 权重 / weight on the global consistent term
# beta_complement: 互补尺度 KL 权重 / weight on per-scale complementary
#
# Usage:
#   python train_distillation.py \
#       --teacher_config configs/distillation/teacher_large.yaml \
#       --student_config configs/distillation/sdd.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks

distillation:
  method: sdd
  weight: 1.0
  params:
    temperature: 4.0
    scales: [2, 4]
    alpha_consistent: 1.0
    beta_complement: 1.0

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001
